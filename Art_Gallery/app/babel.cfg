[python: **.py]
encoding = utf-8
# Extraction keywords for Python files (include lazy gettext `_l` and common gettext names).
# Use comma-separated keywords; include plural and pgettext helpers.
keywords = _l _ gettext lazy_gettext ngettext:1,2 pgettext:1,2 npgettext:1,3

[jinja2: **/templates/**.html]
encoding = utf-8